services:
  steampipe:
    build:
      context: .
      dockerfile: Dockerfile.steampipe
    # No se pasan AWS credentials — usa el Instance Profile de la EC2 (Semaphore_Role)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 9193 -U steampipe"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal
    restart: unless-stopped

  powerpipe:
    build:
      context: .
      dockerfile: Dockerfile.powerpipe
    depends_on:
      steampipe:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    command:
      - --provider=oidc
      - --oidc-issuer-url=https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
      - --client-id=${OAUTH2_PROXY_CLIENT_ID}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --redirect-url=https://${DOMAIN}/oauth2/callback
      - --upstream=http://powerpipe:9033
      - --http-address=0.0.0.0:4180
      - --email-domain=*
      - --cookie-secure=true
      - --reverse-proxy=true
      - --skip-provider-button=true
      # Restricción por Group ID de EntraID
      - --oidc-groups-claim=groups
      - --allowed-group=${ENTRA_ALLOWED_GROUP_ID}
    depends_on:
      - powerpipe
    networks:
      - internal
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - oauth2-proxy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
