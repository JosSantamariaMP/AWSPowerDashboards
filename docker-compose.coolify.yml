services:
  steampipe:
    build:
      context: .
      dockerfile: Dockerfile.steampipe
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 9193 -U steampipe"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  powerpipe:
    build:
      context: .
      dockerfile: Dockerfile.powerpipe
    depends_on:
      steampipe:
        condition: service_healthy
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    command:
      - --provider=oidc
      - --oidc-issuer-url=https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
      - --client-id=${OAUTH2_PROXY_CLIENT_ID}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --redirect-url=https://${DOMAIN}/oauth2/callback
      - --upstream=http://powerpipe:9033
      - --http-address=0.0.0.0:4180
      - --email-domain=*
      # Cookie segura: Traefik termina TLS, el proxy ve HTTP pero la cookie
      # debe marcarse Secure porque el browser la envía por HTTPS
      - --cookie-secure=true
      # Confiar en headers X-Forwarded-* de Traefik
      - --reverse-proxy=true
      # No mostrar botón "Sign in with..." — redirige directo a EntraID
      - --skip-provider-button=true
      # Restricción por grupos de EntraID (OR logic: cualquier grupo da acceso)
      - --oidc-groups-claim=groups
      - --allowed-group=${ENTRA_ALLOWED_GROUP_ID_1}
      - --allowed-group=${ENTRA_ALLOWED_GROUP_ID_2}
      - --allowed-group=${ENTRA_ALLOWED_GROUP_ID_3}
      # CRITICAL: Confiar en X-Forwarded-Proto de Traefik para evitar redirect loops
      - --real-client-ip-header=X-Forwarded-For
    ports:
      - "4180:4180"
    depends_on:
      - powerpipe
    restart: unless-stopped
